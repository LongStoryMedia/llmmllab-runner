[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
# warn_subclassable = True  # Requires newer mypy
warn_unreachable = True
strict_equality = True
strict_optional = True

# Use the generated stubs for type checking
mypy_path = gen/python

# Ignore third-party packages that don't have stubs
ignore_missing_imports = True

# Ignore generated code
exclude = ^gen/python/.*_pb2(_grpc)?\.py$

# Ignore errors in generated models
[mypy-models.default_configs]
ignore_errors = True

[mypy-models.config_utils]
ignore_errors = True

[mypy-models]
ignore_errors = True