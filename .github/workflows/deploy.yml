name: Deploy to lsnode-3

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_HOST: lsnode-3
  DEPLOY_USER: lsm

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            echo "Deploying llmmllab-runner to $DEPLOY_HOST..."
            cd ~/llmmllab-runner
            git pull origin main
            # Add your deploy commands here (e.g., docker compose up -d, systemctl restart, etc.)
